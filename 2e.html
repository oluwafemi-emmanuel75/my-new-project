<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button class="apply-on-company-website-button">
        Apply on company website
    </button>
    <button class="save-button">
        Save
    </button>
    <style>
        .apply-on-company-website-button {
            background-color: rgb(10, 102, 194);
            color: white;
            height: 29px;
            border: none;
            width: 190px;
            border-radius: 20px;
            font-size: bold;
            cursor: pointer;

        }

        .apply-on-company-website-button:hover {
            background-color: blue;
        }

         .save-button {
            background-color: white;
            color: rgb(20, 20, 163);
            height: 29px;
            width: 65px;
            border-radius: 20px;
            border-width: 1px;
            cursor: pointer;

         }

         .save-button:hover {
            background-color: rgb(204, 222, 237);
         }
    </style>
</body>
</html>
